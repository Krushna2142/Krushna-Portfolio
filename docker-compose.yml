version: '3.9'

services:
  # ── MongoDB (local dev only) ───────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: portfolio_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: portfolio
    volumes:
      - mongo_data:/data/db
    networks:
      - portfolio_network

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: portfolio_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://root:rootpassword@mongo:27017/portfolio?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: http://localhost:3000
      ANALYTICS_SECRET: ${ANALYTICS_SECRET}
    volumes:
      - ./backend/src:/app/src   # Hot reload in dev
    depends_on:
      - mongo
    networks:
      - portfolio_network

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: deps           # Use deps stage for dev
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - portfolio_network
    command: npm run dev

volumes:
  mongo_data:
    driver: local

networks:
  portfolio_network:
    driver: bridge