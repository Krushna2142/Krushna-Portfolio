version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: portfolio_backend_prod
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    networks:
      - portfolio_network

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: portfolio_frontend_prod
    restart: always
    ports:
      - "3000:3000"
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge